<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecionar TikTok</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #f0f2f5; }
        .container { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; }
        input { padding: 10px; width: 250px; border: 2px solid #000; border-radius: 5px; font-size: 16px; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <h3>Digite o @ do TikTok</h3>
    <!-- O evento 'oninput' detecta cada letra digitada -->
    <input type="text" id="username" placeholder="Digite o usuário aqui..." oninput="monitorarDigitacao()">
</div>

<script>
    let timer;

    function monitorarDigitacao() {
        let inputField = document.getElementById('username');
        let user = inputField.value.trim().replace('@', '');

        // Limpa o timer anterior para não redirecionar enquanto digita rápido
        clearTimeout(timer);

        // Se o usuário digitou pelo menos 3 letras, espera 1 segundo para redirecionar
        if (user.length >= 3) {
            timer = setTimeout(() => {
                // Abre o perfil
                window.location.href = "https://www.tiktok.com/@" + user;
                
                // Limpa o campo
                inputField.value = '';
            }, 1000); // 1000 milissegundos = 1 segundo de espera após parar de digitar
        }
    }
</script>

<!-- Firebase: só serve pra receber o comando do Python e preencher o campo -->
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    // Mesma config do projeto tiktokteladividida
    const firebaseConfig = {
        apiKey: "AIzaSyDFy7nOPfPj5lsPbJMb9hYZa36Vse9NwUA",
        authDomain: "tiktokteladividida.firebaseapp.com",
        databaseURL: "https://tiktokteladividida-default-rtdb.firebaseio.com",
        projectId: "tiktokteladividida",
        storageBucket: "tiktokteladividida.firebasestorage.app",
        messagingSenderId: "501758978124",
        appId: "1:501758978124:web:80db3f4d2c43eaa775ece9"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const statusRef = ref(db, "status");
    const commandRef = ref(db, "comando");

    const inputField = document.getElementById("username");

    // Marca online/offline igual ao index.html
    set(statusRef, "online");
    window.addEventListener("beforeunload", () => set(statusRef, "offline"));

    // Escuta o Firebase; quando chegar comando, preenche o campo e
    // chama a MESMA função monitorarDigitacao() que já existia
    onValue(commandRef, (snapshot) => {
        const comando = snapshot.val();
        if (comando && typeof comando === "string" && comando.trim() !== "") {
            inputField.value = comando;
            monitorarDigitacao();
            set(commandRef, ""); // reseta pra não repetir o mesmo comando
        }
    });
</script>

</body>
</html>
